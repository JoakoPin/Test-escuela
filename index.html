<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - Proyecto Web</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .menu-container {
            background: var(--card);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-item {
            display: block;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .status-badge {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>

<body>

    <div class="menu-container">
        <h1>Portal de Pruebas</h1>
        <p>Selecciona una herramienta para comenzar el testeo.</p>

        <nav class="nav-list">
            <a href="html.html" class="nav-item">🚀 Laboratorio JS</a>
            <a href="#" class="nav-item" style="opacity: 0.5; cursor: not-allowed;">📊 Estadísticas (Próximamente)</a>
            <a href="#" class="nav-item" style="opacity: 0.5; cursor: not-allowed;">⚙️ Ajustes</a>
        </nav>

        <div class="status-badge">Entorno de Desarrollo v1.0</div>
    </div>

</body>

</html>
